name: Package Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: read
  packages: write

jobs:
  release:
    uses: spigell/my-shared-workflows/.github/workflows/nodejs-package-release.yaml@main
    with:
      working-directory: '.'
      package-directory: '.'
      build-command: |
        yarn install --frozen-lockfile
        yarn lint
        yarn build
        yarn test
    secrets:
      token: ${{ secrets.NPM_TOKEN }}
